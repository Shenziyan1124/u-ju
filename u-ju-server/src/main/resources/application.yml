server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/u_ju?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: shenziyan
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto

jwt:
  secret: UJuPlatform2026SecretKeyForHS256AlgorithmTokenSigning
  expiration: 86400000

knife4j:
  enable: true
  setting:
    language: zh_cn

upload:
  path: ./uploads/
  allowed-types: image/jpeg,image/png,image/gif,image/webg
  max-size: 10485760
